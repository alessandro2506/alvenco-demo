name: Weekly Blog Post

on:
  schedule:
    - cron: "0 8 * * 1"
  workflow_dispatch:

jobs:
  generate-post:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm ci

      - name: Generate blog post
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node scripts/generate-blog-post.mjs

      - name: Commit and push
        run: |
          git config user.name "Alvenco Blog Bot"
          git config user.email "hello@alvencoltd.co.uk"
          git add content/blog/
          git diff --staged --quiet || git commit -m "feat(blog): auto-generated post $(date +%Y-%m-%d)"
          git push